# local + local-h2 프로필: H2 인메모리 DB (PostgreSQL 없이 실행)
# 사용: SPRING_PROFILES_ACTIVE=local,local-h2
spring:
  datasource:
    url: jdbc:h2:mem:sellerhelper;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
