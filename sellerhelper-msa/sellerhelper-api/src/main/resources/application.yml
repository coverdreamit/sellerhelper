spring:
  application:
    name: sellerhelper-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

# Portal과 동일한 값 사용 (토큰 검증)
jwt:
  secret: ${JWT_SECRET:sellerhelper-jwt-secret-key-at-least-32-bytes-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

app:
  dev-mode: ${APP_DEV_MODE:false}

logging:
  level:
    org.hibernate.SQL: debug
    com.sellerhelper: debug
