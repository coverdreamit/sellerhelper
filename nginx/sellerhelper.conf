# 셀러헬퍼 API 라우팅
# - /api/auth, /api/users, /api/companies, /api/roles, /api/my-company, /api/app → portal (인증)
# - /api/stores, /api/malls, /api/my-stores, 기타 → commerce (로드밸런싱)

upstream portal {
    server sellerhelper-portal:5081 max_fails=2 fail_timeout=30s;
}

upstream commerce {
    least_conn;  # 연결 수 적은 쪽으로
    server sellerhelper-commerce-1:5080 max_fails=2 fail_timeout=30s;
    server sellerhelper-commerce-2:5080 max_fails=2 fail_timeout=30s;
    server sellerhelper-commerce-3:5080 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # 포털 (인증·사용자·회사·권한)
    location /api/auth/ {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/users {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/companies {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/roles {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/my-company {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/app/ {
        proxy_pass http://portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 커머스 (스토어·몰·상품·주문) - 로드밸런싱
    location /api/ {
        proxy_pass http://commerce;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
