spring:
  application:
    name: sellerhelper-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: Asia/Seoul
          batch_size: 100
        order_inserts: true
        order_updates: true
    open-in-view: false

server:
  port: ${SERVER_PORT:5080}

# JWT (단일 프로젝트 - 로그인 발급·검증 동일 서버)
jwt:
  secret: ${JWT_SECRET:sellerhelper-jwt-secret-key-at-least-32-bytes-long-for-hs256}
  expiration: ${JWT_EXPIRATION:21600000}

# CORS: 비어있으면 localhost/127.0.0.1 모든 포트 허용. 지정 시 해당 Origin만 사용
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# 앱 설정 (프로필별로 오버라이드)
app:
  dev-mode: ${APP_DEV_MODE:false}

logging:
  level:
    org.hibernate.SQL: debug
    com.sellerhelper: debug
    # API 요청/응답 로그 (네이버 등 외부 API 호출 시 콘솔 출력)
    API: info
