# Dev 환경 오버라이드 (sellerhelper-dev DB, 별도 포트)
# 사용: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  sellerhelper-be:
    container_name: sellerhelper-be-dev
    ports:
      - "5082:5080"
    environment:
      DB_NAME: sellerhelper-dev

  sellerhelper-fe:
    container_name: sellerhelper-fe-dev
    ports:
      - "5001:5000"
